<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek | 极简助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        /* 头部 - 高级黑 */
        .header {
            background: #0d0d0d;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #f5f5f5;
        }

        .token-badge {
            background: #1e1e1e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            font-family: monospace;
            color: #aaa;
            border: 1px solid #2e2e2e;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .settings-btn:active {
            background: #2a2a2a;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 4px;
            position: relative;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.assistant {
            justify-content: flex-start;
        }

        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 24px;
            line-height: 1.45;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
        }

        .user .message {
            background: #2a2a2a;
            color: #f0f0f0;
            border-bottom-right-radius: 6px;
        }

        .assistant .message {
            background: #1e1e1e;
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
            border: 1px solid #2c2c2c;
        }

        .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            color: #888;
            transition: all 0.2s;
            margin-left: 8px;
            align-self: center;
        }

        .message-wrapper:hover .delete-btn,
        .delete-btn:active {
            opacity: 1;
        }

        .delete-btn:active {
            background: #2c2c2c;
            color: #ff6b6b;
        }

        .warning-badge {
            background: #2c2c2c;
            color: #ffb347;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            margin: 8px 16px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #3a3a3a;
        }

        .input-area {
            background: #0d0d0d;
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2c2c2c;
            border-radius: 28px;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            background: #141414;
            color: #f0f0f0;
            transition: border 0.2s;
        }

        .input-area textarea:focus {
            border-color: #555;
        }

        .input-area button {
            background: #2a2a2a;
            color: #ddd;
            border: none;
            padding: 0 24px;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-area button:active {
            background: #3a3a3a;
            color: white;
        }

        .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-card {
            background: #121212;
            width: 86%;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #2c2c2c;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .settings-card h3 {
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 20px;
            color: #f5f5f5;
        }

        .settings-card label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            display: block;
        }

        .settings-card input, .settings-card select {
            width: 100%;
            padding: 12px;
            margin: 6px 0 18px;
            border: 1px solid #2c2c2c;
            border-radius: 14px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 14px;
        }

        .settings-card button {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .settings-card button:active {
            background: #3a3a3a;
        }

        .danger-btn {
            background: #2a1a1a !important;
            color: #ff8888 !important;
        }

        .secondary-btn {
            background: #1a1a1a !important;
            border: 1px solid #2c2c2c !important;
        }

        .api-hint {
            font-size: 11px;
            color: #666;
            margin-top: 12px;
            text-align: center;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h1>DeepSeek</h1>
            <span class="token-badge" id="tokenCount">0 tok (0%)</span>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <textarea id="messageInput" placeholder="输入消息... (↵ 换行, Shift+↵ 发送)" rows="1"></textarea>
        <button onclick="sendMessage()">发送</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-card">
            <h3>⚙️ 设置</h3>
            <label>API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxx">
            <button onclick="saveApiKey()">保存</button>
            
            <label>最大保留消息数</label>
            <select id="maxMessagesSelect">
                <option value="20">20条 (紧凑)</option>
                <option value="40">40条 (平衡)</option>
                <option value="60" selected>60条 (推荐)</option>
                <option value="80">80条 (极限)</option>
            </select>
            
            <button onclick="exportChat()">📁 导出对话</button>
            <button onclick="clearChat()" class="danger-btn">🗑️ 清空所有</button>
            <button onclick="closeSettings()" class="secondary-btn">关闭</button>
            <div class="api-hint">长按消息可删除 · 自动防超限</div>
        </div>
    </div>

    <script>
        let messages = [];
        const MAX_CONTEXT = 131072;

        function estimateTokens(text) {
            return Math.ceil(text.length * 1.3);
        }

        function calculateTotalTokens() {
            return messages.reduce((sum, msg) => sum + estimateTokens(msg.content), 0);
        }

        function updateTokenDisplay() {
            const total = calculateTotalTokens();
            const percent = (total / MAX_CONTEXT * 100).toFixed(1);
            const tokenElem = document.getElementById('tokenCount');
            if (tokenElem) {
                tokenElem.textContent = `${total} tok (${percent}%)`;
                if (total > MAX_CONTEXT * 0.85) tokenElem.style.color = '#ff8888';
                else if (total > MAX_CONTEXT * 0.6) tokenElem.style.color = '#ffb347';
                else tokenElem.style.color = '#aaa';
            }
            if (total > MAX_CONTEXT * 0.85) showWarning();
            else removeWarning();
            return total;
        }

        function showWarning() {
            if (!document.querySelector('.warning-badge')) {
                const container = document.getElementById('chatContainer');
                const warning = document.createElement('div');
                warning.className = 'warning-badge';
                warning.innerHTML = '⚠️ 接近上下文上限 · 建议清空或导出';
                warning.onclick = () => openSettings();
                container.insertBefore(warning, container.firstChild);
            }
        }

        function removeWarning() {
            const warn = document.querySelector('.warning-badge');
            if (warn) warn.remove();
        }

        function autoTruncate() {
            const maxMsgs = parseInt(document.getElementById('maxMessagesSelect')?.value || 60);
            while (messages.length > maxMsgs) messages.shift();
            let total = calculateTotalTokens();
            while (total > MAX_CONTEXT - 4000 && messages.length > 1) {
                messages.shift();
                total = calculateTotalTokens();
            }
            saveChatHistory();
            renderMessages();
            updateTokenDisplay();
        }

        function addSystemMessage(content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message-wrapper assistant';
            div.innerHTML = `<div class="message">${content}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                closeSettings();
                addSystemMessage('✓ API Key 已保存');
            } else alert('请输入有效的 Key');
        }

        function loadApiKey() {
            const key = localStorage.getItem('deepseek_api_key');
            if (key) document.getElementById('apiKeyInput').value = key;
        }

        function saveChatHistory() {
            localStorage.setItem('deepseek_chat_history', JSON.stringify(messages));
        }

        function loadChatHistory() {
            const saved = localStorage.getItem('deepseek_chat_history');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
                updateTokenDisplay();
            } else {
                messages = [];
            }
        }

        function deleteMessage(index) {
            if (confirm('删除这条消息？')) {
                messages.splice(index, 1);
                saveChatHistory();
                renderMessages();
                updateTokenDisplay();
                autoTruncate();
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages.forEach((msg, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role}`;
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.textContent = msg.content;
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.className = 'delete-btn';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteMessage(idx);
                };
                wrapper.appendChild(msgDiv);
                wrapper.appendChild(delBtn);
                container.appendChild(wrapper);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content, save = true) {
            messages.push({ role, content });
            if (save) saveChatHistory();
            renderMessages();
            updateTokenDisplay();
            autoTruncate();
        }

        function clearChat() {
            if (confirm('清空所有对话？建议先导出。')) {
                messages = [];
                saveChatHistory();
                renderMessages();
                updateTokenDisplay();
                removeWarning();
                addSystemMessage('对话已清空');
            }
        }

        function exportChat() {
            if (!messages.length) return alert('无对话');
            let text = `DeepSeek 导出 · ${new Date().toLocaleString()}\n${'='.repeat(50)}\n\n`;
            for (let msg of messages) {
                text += `【${msg.role === 'user' ? '我' : 'DeepSeek'}】\n${msg.content}\n\n`;
            }
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `deepseek_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            addSystemMessage('✓ 已导出');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置 API Key');
                openSettings();
                return;
            }

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const loadingMsg = { role: 'assistant', content: '...' };
            const loadingIdx = messages.length;
            messages.push(loadingMsg);
            renderMessages();

            try {
                const sendMessages = messages.filter(m => m.content !== '...').map(m => ({ role: m.role, content: m.content }));
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: sendMessages,
                        stream: false
                    })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || '请求失败');
                }
                const data = await res.json();
                const reply = data.choices[0].message.content;
                messages[loadingIdx] = { role: 'assistant', content: reply };
                saveChatHistory();
                renderMessages();
                updateTokenDisplay();
            } catch (err) {
                messages[loadingIdx] = { role: 'assistant', content: `❌ ${err.message}` };
                renderMessages();
            }
        }

        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'flex';
            const savedMax = localStorage.getItem('deepseek_max_messages');
            if (savedMax) document.getElementById('maxMessagesSelect').value = savedMax;
        }
        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
            const maxVal = document.getElementById('maxMessagesSelect').value;
            localStorage.setItem('deepseek_max_messages', maxVal);
            autoTruncate();
        }

        function autoResizeTextarea() {
            const ta = document.getElementById('messageInput');
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        }

        // 回车 = 换行，Shift+回车 = 发送
        document.getElementById('messageInput').addEventListener('input', autoResizeTextarea);
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                // 回车：换行（不做任何事，让默认换行生效）
                return;
            }
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('settingsPanel').addEventListener('click', (e) => {
            if (e.target === document.getElementById('settingsPanel')) closeSettings();
        });

        loadApiKey();
        loadChatHistory();
        if (messages.length === 0) addMessage('assistant', '你好，我是 DeepSeek。黑白之间，只专注对话。');
    </script>
</body>
</html>
