<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DeepSeek 安卓助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 头部 */
        .header {
            background: #1e6f3f;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .settings-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 0 8px;
        }
        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #1e6f3f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .loading {
            background: #e0e0e0;
            color: #666;
            align-self: flex-start;
            font-style: italic;
        }
        /* 输入区域 */
        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .input-area button {
            background: #1e6f3f;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .settings-card {
            background: white;
            width: 85%;
            border-radius: 16px;
            padding: 20px;
        }
        .settings-card h3 {
            margin-bottom: 16px;
        }
        .settings-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .settings-card button {
            background: #1e6f3f;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .clear-btn {
            background: #dc3545 !important;
            margin-top: 10px;
        }
        .api-hint {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>🤖 DeepSeek 助手</span>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">你好！我是DeepSeek助手。请先点击右上角⚙️设置你的API Key。</div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." />
        <button onclick="sendMessage()">发送</button>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-card">
            <h3>⚙️ API设置</h3>
            <label>DeepSeek API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxx">
            <button onclick="saveApiKey()">保存</button>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
            <div class="api-hint">
                获取Key: platform.deepseek.com<br>
                需要充值后才可使用
            </div>
        </div>
    </div>

    <script>
        let messages = [];

        // 加载保存的API Key
        function loadApiKey() {
            const key = localStorage.getItem('deepseek_api_key');
            if (key) {
                document.getElementById('apiKeyInput').value = key;
            }
        }

        // 保存API Key
        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                closeSettings();
                addMessage('assistant', '✅ API Key已保存，现在可以开始对话了！');
            } else {
                alert('请输入有效的API Key');
            }
        }

        // 加载历史对话
        function loadChatHistory() {
            const saved = localStorage.getItem('deepseek_chat_history');
            if (saved) {
                messages = JSON.parse(saved);
                renderMessages();
            } else {
                messages = [];
            }
        }

        // 保存对话历史
        function saveChatHistory() {
            localStorage.setItem('deepseek_chat_history', JSON.stringify(messages));
        }

        // 清空对话
        function clearChat() {
            messages = [];
            saveChatHistory();
            renderMessages();
            addMessage('assistant', '对话已清空！有什么我可以帮你的吗？');
        }

        // 添加消息并渲染
        function addMessage(role, content) {
            messages.push({ role, content });
            saveChatHistory();
            renderMessages();
        }

        // 渲染所有消息
        function renderMessages() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            for (let msg of messages) {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.textContent = msg.content;
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置API Key');
                openSettings();
                return;
            }

            // 添加用户消息
            addMessage('user', text);
            input.value = '';

            // 显示加载中
            const loadingMsg = { role: 'assistant', content: '思考中...' };
            const loadingIndex = messages.length;
            messages.push(loadingMsg);
            renderMessages();

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages.filter(m => m.role !== 'loading').map(m => ({
                            role: m.role,
                            content: m.content
                        })),
                        stream: false
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // 替换加载消息
                messages[loadingIndex] = { role: 'assistant', content: reply };
                saveChatHistory();
                renderMessages();

            } catch (error) {
                console.error('Error:', error);
                messages[loadingIndex] = { role: 'assistant', content: `❌ 错误: ${error.message}` };
                renderMessages();
            }
        }

        // 设置面板控制
        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'flex';
        }
        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
        }

        // 点击背景关闭
        document.getElementById('settingsPanel').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        // 回车发送
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // 初始化
        loadApiKey();
        loadChatHistory();

        // 如果没有欢迎消息，添加一条
        if (messages.length === 0) {
            addMessage('assistant', '你好！我是DeepSeek助手。请先点击右上角⚙️设置你的API Key。');
        }
    </script>
</body>
</html>
