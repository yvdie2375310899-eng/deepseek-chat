<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek | 多对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        /* 头部 */
        .header {
            background: #0d0d0d;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .header-left h1 {
            font-size: 18px;
            font-weight: 500;
            color: #f5f5f5;
            white-space: nowrap;
        }

        .token-badge {
            background: #1e1e1e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            color: #aaa;
            border: 1px solid #2e2e2e;
            white-space: nowrap;
        }

        /* 对话切换器 */
        .conversation-selector {
            background: #1e1e1e;
            border-radius: 24px;
            padding: 4px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            max-width: 50%;
            flex-shrink: 1;
        }

        .conv-tab {
            background: #2a2a2a;
            border: none;
            color: #ccc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .conv-tab.active {
            background: #3a3a3a;
            color: white;
        }

        .conv-tab:active {
            background: #4a4a4a;
        }

        .new-conv-btn {
            background: #2a2a2a;
            border: none;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
        }

        .settings-btn:active {
            background: #2a2a2a;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 4px;
            position: relative;
            align-items: flex-start;
            gap: 6px;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.assistant {
            justify-content: flex-start;
        }

        .message {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 24px;
            line-height: 1.45;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .message {
            background: #2a2a2a;
            color: #f0f0f0;
            border-bottom-right-radius: 6px;
        }

        .assistant .message {
            background: #1e1e1e;
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
            border: 1px solid #2c2c2c;
        }

        /* 消息操作按钮组 */
        .message-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            align-self: center;
        }

        .message-wrapper:hover .message-actions,
        .message-actions:active {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
            color: #888;
            transition: all 0.2s;
        }

        .action-btn:active {
            background: #2c2c2c;
            color: #ffb347;
        }

        .delete-btn:active {
            color: #ff6b6b;
        }

        .warning-badge {
            background: #2c2c2c;
            color: #ffb347;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            margin: 8px 16px;
            text-align: center;
            cursor: pointer;
        }

        /* 输入区域 */
        .input-area {
            background: #0d0d0d;
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #2c2c2c;
            border-radius: 28px;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            background: #141414;
            color: #f0f0f0;
        }

        .input-area textarea:focus {
            border-color: #555;
        }

        .input-area button {
            background: #2a2a2a;
            color: #ddd;
            border: none;
            padding: 0 24px;
            border-radius: 32px;
            font-size: 15px;
            cursor: pointer;
        }

        .input-area button:active {
            background: #3a3a3a;
            color: white;
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-card {
            background: #121212;
            width: 86%;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #2c2c2c;
            max-height: 80%;
            overflow-y: auto;
        }

        .settings-card h3 {
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 20px;
            color: #f5f5f5;
        }

        .settings-card label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            display: block;
        }

        .settings-card input, .settings-card select {
            width: 100%;
            padding: 12px;
            margin: 6px 0 18px;
            border: 1px solid #2c2c2c;
            border-radius: 14px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 14px;
        }

        .settings-card button {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .danger-btn {
            background: #2a1a1a !important;
            color: #ff8888 !important;
        }

        .secondary-btn {
            background: #1a1a1a !important;
            border: 1px solid #2c2c2c !important;
        }

        .api-hint {
            font-size: 11px;
            color: #666;
            margin-top: 12px;
            text-align: center;
        }

        .conv-manager {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #2c2c2c;
            padding-top: 10px;
        }

        .conv-manager-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2c2c2c;
        }

        .conv-manager-name {
            flex: 1;
            cursor: pointer;
            font-size: 14px;
        }

        .conv-manager-del {
            background: none;
            border: none;
            color: #ff8888;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
        .conversation-selector::-webkit-scrollbar {
            height: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>DeepSeek</h1>
            <span class="token-badge" id="tokenCount">0 tok (0%)</span>
        </div>
        <div class="conversation-selector" id="convSelector"></div>
        <div class="header-right">
            <button class="new-conv-btn" onclick="createNewConversation()">+新对话</button>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <textarea id="messageInput" placeholder="输入消息... (↵ 换行, Shift+↵ 发送)" rows="1"></textarea>
        <button onclick="sendMessage()">发送</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-card">
            <h3>⚙️ 设置</h3>
            <label>API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxx">
            <button onclick="saveApiKey()">保存</button>
            
            <label>最大保留消息数</label>
            <select id="maxMessagesSelect">
                <option value="20">20条 (紧凑)</option>
                <option value="40">40条 (平衡)</option>
                <option value="60" selected>60条 (推荐)</option>
                <option value="80">80条 (极限)</option>
            </select>
            
            <label>📋 对话列表</label>
            <div class="conv-manager" id="convManager"></div>
            
            <button onclick="exportChat()">📁 导出当前对话</button>
            <button onclick="clearChat()" class="danger-btn">🗑️ 清空当前对话</button>
            <button onclick="closeSettings()" class="secondary-btn">关闭</button>
            <div class="api-hint">长按消息可复制 · 点击✕删除消息 · 支持多对话</div>
        </div>
    </div>

    <script>
        // 数据结构
        let conversations = {};
        let currentConvId = null;
        let currentMessages = [];
        const MAX_CONTEXT = 131072;

        // 初始化
        function loadAllData() {
            const saved = localStorage.getItem('deepseek_conversations');
            if (saved) {
                conversations = JSON.parse(saved);
            } else {
                conversations = {
                    'conv_1': {
                        id: 'conv_1',
                        name: '对话 1',
                        messages: [],
                        createdAt: Date.now()
                    }
                };
            }
            
            // 获取当前对话ID
            currentConvId = localStorage.getItem('deepseek_current_conv');
            if (!currentConvId || !conversations[currentConvId]) {
                currentConvId = Object.keys(conversations)[0];
            }
            
            currentMessages = conversations[currentConvId]?.messages || [];
            renderConversationTabs();
            renderConvManager();
            renderMessages();
            updateTokenDisplay();
        }

        function saveAllData() {
            localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
            renderConversationTabs();
            renderConvManager();
        }

        function saveCurrentConv() {
            if (currentConvId && conversations[currentConvId]) {
                conversations[currentConvId].messages = currentMessages;
                saveAllData();
            }
        }

        function switchConversation(convId) {
            if (currentConvId) {
                conversations[currentConvId].messages = currentMessages;
            }
            currentConvId = convId;
            currentMessages = conversations[convId].messages;
            localStorage.setItem('deepseek_current_conv', convId);
            renderMessages();
            updateTokenDisplay();
            renderConversationTabs();
        }

        function createNewConversation() {
            const newId = 'conv_' + Date.now();
            const newName = `对话 ${Object.keys(conversations).length + 1}`;
            conversations[newId] = {
                id: newId,
                name: newName,
                messages: [],
                createdAt: Date.now()
            };
            saveAllData();
            switchConversation(newId);
            addSystemMessage('✨ 新对话已创建，可以开始新话题了！');
        }

        function renameConversation(convId, newName) {
            if (conversations[convId]) {
                conversations[convId].name = newName;
                saveAllData();
            }
        }

        function deleteConversation(convId) {
            if (Object.keys(conversations).length === 1) {
                alert('至少保留一个对话');
                return;
            }
            if (confirm('删除这个对话？所有聊天记录会丢失。')) {
                delete conversations[convId];
                if (currentConvId === convId) {
                    const newId = Object.keys(conversations)[0];
                    switchConversation(newId);
                } else {
                    saveAllData();
                    renderConversationTabs();
                    renderConvManager();
                }
            }
        }

        function renderConversationTabs() {
            const container = document.getElementById('convSelector');
            if (!container) return;
            container.innerHTML = '';
            Object.values(conversations).forEach(conv => {
                const btn = document.createElement('button');
                btn.className = `conv-tab ${conv.id === currentConvId ? 'active' : ''}`;
                btn.textContent = conv.name.length > 12 ? conv.name.slice(0, 10) + '..' : conv.name;
                btn.onclick = () => switchConversation(conv.id);
                container.appendChild(btn);
            });
        }

        function renderConvManager() {
            const container = document.getElementById('convManager');
            if (!container) return;
            container.innerHTML = '';
            Object.values(conversations).forEach(conv => {
                const div = document.createElement('div');
                div.className = 'conv-manager-item';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'conv-manager-name';
                nameSpan.textContent = conv.name;
                nameSpan.onclick = () => {
                    switchConversation(conv.id);
                    closeSettings();
                };
                const renameBtn = document.createElement('button');
                renameBtn.textContent = '✏️';
                renameBtn.className = 'action-btn';
                renameBtn.onclick = (e) => {
                    e.stopPropagation();
                    const newName = prompt('新名称:', conv.name);
                    if (newName && newName.trim()) renameConversation(conv.id, newName.trim());
                };
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.className = 'conv-manager-del';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteConversation(conv.id);
                };
                div.appendChild(nameSpan);
                div.appendChild(renameBtn);
                div.appendChild(delBtn);
                container.appendChild(div);
            });
        }

        function estimateTokens(text) {
            return Math.ceil(text.length * 1.3);
        }

        function calculateTotalTokens() {
            return currentMessages.reduce((sum, msg) => sum + estimateTokens(msg.content), 0);
        }

        function updateTokenDisplay() {
            const total = calculateTotalTokens();
            const percent = (total / MAX_CONTEXT * 100).toFixed(1);
            const tokenElem = document.getElementById('tokenCount');
            if (tokenElem) {
                tokenElem.textContent = `${total} tok (${percent}%)`;
                if (total > MAX_CONTEXT * 0.85) tokenElem.style.color = '#ff8888';
                else if (total > MAX_CONTEXT * 0.6) tokenElem.style.color = '#ffb347';
                else tokenElem.style.color = '#aaa';
            }
            if (total > MAX_CONTEXT * 0.85) showWarning();
            else removeWarning();
            return total;
        }

        function showWarning() {
            if (!document.querySelector('.warning-badge')) {
                const container = document.getElementById('chatContainer');
                const warning = document.createElement('div');
                warning.className = 'warning-badge';
                warning.innerHTML = '⚠️ 接近上下文上限 · 建议清空或导出';
                warning.onclick = () => openSettings();
                container.insertBefore(warning, container.firstChild);
            }
        }

        function removeWarning() {
            const warn = document.querySelector('.warning-badge');
            if (warn) warn.remove();
        }

        function autoTruncate() {
            const maxMsgs = parseInt(document.getElementById('maxMessagesSelect')?.value || 60);
            while (currentMessages.length > maxMsgs) currentMessages.shift();
            let total = calculateTotalTokens();
            while (total > MAX_CONTEXT - 4000 && currentMessages.length > 1) {
                currentMessages.shift();
                total = calculateTotalTokens();
            }
            saveCurrentConv();
            renderMessages();
            updateTokenDisplay();
        }

        function addSystemMessage(content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message-wrapper assistant';
            div.innerHTML = `<div class="message">${content}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                closeSettings();
                addSystemMessage('✓ API Key 已保存');
            } else alert('请输入有效的 Key');
        }

        function loadApiKey() {
            const key = localStorage.getItem('deepseek_api_key');
            if (key) document.getElementById('apiKeyInput').value = key;
        }

        // 复制消息内容
        function copyMessage(content) {
            navigator.clipboard.writeText(content).then(() => {
                addSystemMessage('✓ 已复制到剪贴板');
            }).catch(() => {
                alert('复制失败');
            });
        }

        function deleteMessage(index) {
            if (confirm('删除这条消息？')) {
                currentMessages.splice(index, 1);
                saveCurrentConv();
                renderMessages();
                updateTokenDisplay();
                autoTruncate();
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            if (!container) return;
            container.innerHTML = '';
            currentMessages.forEach((msg, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role}`;
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.textContent = msg.content;
                
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                
                const copyBtn = document.createElement('button');
                copyBtn.textContent = '📋';
                copyBtn.className = 'action-btn';
                copyBtn.title = '复制';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    copyMessage(msg.content);
                };
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.className = 'action-btn delete-btn';
                delBtn.title = '删除';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteMessage(idx);
                };
                
                actions.appendChild(copyBtn);
                actions.appendChild(delBtn);
                wrapper.appendChild(msgDiv);
                wrapper.appendChild(actions);
                container.appendChild(wrapper);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content, save = true) {
            currentMessages.push({ role, content });
            if (save) saveCurrentConv();
            renderMessages();
            updateTokenDisplay();
            autoTruncate();
        }

        function clearChat() {
            if (confirm('清空当前对话？建议先导出。')) {
                currentMessages = [];
                saveCurrentConv();
                renderMessages();
                updateTokenDisplay();
                removeWarning();
                addSystemMessage('当前对话已清空');
            }
        }

        function exportChat() {
            if (!currentMessages.length) return alert('无对话');
            let text = `DeepSeek 导出 · ${new Date().toLocaleString()}\n对话：${conversations[currentConvId]?.name || '当前对话'}\n${'='.repeat(50)}\n\n`;
            for (let msg of currentMessages) {
                text += `【${msg.role === 'user' ? '我' : 'DeepSeek'}】\n${msg.content}\n\n`;
            }
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `deepseek_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            addSystemMessage('✓ 已导出');
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const apiKey = localStorage.getItem('deepseek_api_key');
            if (!apiKey) {
                alert('请先设置 API Key');
                openSettings();
                return;
            }

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const loadingMsg = { role: 'assistant', content: '...' };
            const loadingIdx = currentMessages.length;
            currentMessages.push(loadingMsg);
            renderMessages();

            try {
                const sendMessages = currentMessages.filter(m => m.content !== '...').map(m => ({ role: m.role, content: m.content }));
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: sendMessages,
                        stream: false
                    })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || '请求失败');
                }
                const data = await res.json();
                const reply = data.choices[0].message.content;
                currentMessages[loadingIdx] = { role: 'assistant', content: reply };
                saveCurrentConv();
                renderMessages();
                updateTokenDisplay();
            } catch (err) {
                currentMessages[loadingIdx] = { role: 'assistant', content: `❌ ${err.message}` };
                renderMessages();
            }
        }

        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'flex';
            const savedMax = localStorage.getItem('deepseek_max_messages');
            if (savedMax) document.getElementById('maxMessagesSelect').value = savedMax;
            renderConvManager();
        }
        
        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
            const maxVal = document.getElementById('maxMessagesSelect').value;
            localStorage.setItem('deepseek_max_messages', maxVal);
            autoTruncate();
        }

        function autoResizeTextarea() {
            const ta = document.getElementById('messageInput');
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
        }

        document.getElementById('messageInput').addEventListener('input', autoResizeTextarea);
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) return;
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('settingsPanel').addEventListener('click', (e) => {
            if (e.target === document.getElementById('settingsPanel')) closeSettings();
        });

        loadApiKey();
        loadAllData();
        if (currentMessages.length === 0) addMessage('assistant', '你好！支持多对话管理了：\n• 点"+新对话"创建独立话题\n• 点击消息旁的📋复制内容\n• 点击✕删除单条消息\n• 顶部标签页快速切换对话');
    </script>
</body>
</html>
